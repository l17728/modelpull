name: ✨ Feature Request
description: 提议新功能或能力
title: "[Feature] "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        感谢提议！请确保该 feature 不在已有 roadmap 中：
        - [v2.0 范围（docs/v2.0/08-mvp-roadmap.md）](../docs/v2.0/08-mvp-roadmap.md)
        - [v2.1+ Roadmap（docs/v2.0/06-platform-and-ecosystem.md §9）](../docs/v2.0/06-platform-and-ecosystem.md)

  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 用户痛点 / 业务场景 / 当前的 workaround
      placeholder: |
        作为 ___ 角色，我希望 ___ ，以便 ___ 。
        当前我只能通过 ___ 解决，这有以下问题：……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案概述
      description: 高层方案描述；至少给出输入/输出与影响面
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响层
      multiple: true
      options:
        - 架构（01）
        - 协议（02）
        - 分布式正确性（03）
        - 安全/租户/合规（04）
        - 运维/可观测（05）
        - 平台/多源（06）
        - 测试（07）
        - 前端（10）
        - CLI/SDK（11）
        - 部署物料（deploy/）
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 候选方案对比
      description: 至少描述 1 个备选方案及其权衡

  - type: dropdown
    id: priority
    attributes:
      label: 期望版本
      options:
        - v2.0 GA 前必须
        - v2.0 GA 后 v2.1
        - v2.x（无明确节点）
        - v3.0 大版本

  - type: textarea
    id: invariants
    attributes:
      label: 是否影响现有不变量？
      description: 检查 [01 §7](../docs/v2.0/01-architecture.md) 的 14 条不变量；如影响，说明如何不破坏

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已查看 v2.1+ Roadmap 确认未规划
          required: true
        - label: 我已搜索现有 issue 无重复
          required: true

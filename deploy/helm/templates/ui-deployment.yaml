{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dlw.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dlw.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "dlw.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dlw.ui.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.common.podSecurityContext | nindent 8 }}
      containers:
        - name: ui
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          ports:
            - containerPort: 80
          env:
            - name: API_BASE_URL
              value: {{ .Values.ui.config.api_base_url | quote }}
            - name: WS_BASE_URL
              value: {{ .Values.ui.config.ws_base_url | quote }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.common.containerSecurityContext | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dlw.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    {{- include "dlw.ui.selectorLabels" . | nindent 4 }}
---
{{- if .Values.ui.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dlw.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' {{ .Values.ui.config.api_base_url }} {{ .Values.ui.config.ws_base_url }};" always;
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
spec:
  ingressClassName: {{ .Values.ui.ingress.className }}
  tls:
    {{- toYaml .Values.ui.ingress.tls | nindent 4 }}
  rules:
    - host: {{ .Values.ui.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dlw.fullname" . }}-ui
                port:
                  number: 80
{{- end }}
{{- end }}

{{- if .Values.controller.secrets.vault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "dlw.fullname" . }}-vault
  namespace: {{ .Release.Namespace }}
spec:
  provider: vault
  parameters:
    roleName: {{ .Values.controller.secrets.vault.role | quote }}
    vaultAddress: "https://vault.example.com:8200"
    objects: |
      - objectName: hf_token_primary
        secretPath: "secret/data/dlw/hf_token"
        secretKey: primary
      - objectName: hf_token_secondary
        secretPath: "secret/data/dlw/hf_token"
        secretKey: secondary
      - objectName: db_password
        secretPath: "secret/data/dlw/db"
        secretKey: password
      - objectName: kms_key_id
        secretPath: "secret/data/dlw/kms"
        secretKey: key_id
      - objectName: oidc_client_secret
        secretPath: "secret/data/dlw/oidc"
        secretKey: client_secret
{{- end }}

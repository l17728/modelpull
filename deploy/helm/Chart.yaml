apiVersion: v2
name: dlw
description: Distributed HuggingFace model weight downloader
type: application
version: 2.0.0
appVersion: "2.0.0"
keywords:
  - huggingface
  - model
  - download
  - distributed
home: https://dlw.example.com
sources:
  - https://github.com/example/dlw
maintainers:
  - name: dlw team
    email: dlw@example.com

dependencies:
  - name: postgresql
    version: 16.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: prometheus
    version: 25.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: observability.prometheus.enabled
  - name: grafana
    version: 7.x.x
    repository: https://grafana.github.io/helm-charts
    condition: observability.grafana.enabled
